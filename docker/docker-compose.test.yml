version: '3.8'

services:
  fangops-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    volumes:
      - fangops-data:/app/data
    networks:
      - fangops-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - fangops-net

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port
    networks:
      - fangops-net

networks:
  fangops-net:
    driver: bridge

volumes:
  fangops-data:
