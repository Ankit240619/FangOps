# Sentinel Hand Test Environment

global:
  scrape_interval: 15s

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fangops-api"
    static_configs:
      - targets: ["fangops-api:3000"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # Note: Sentinel Webhook receiver will act as the Alertmanager target
          # The exact port/path should match the API server's ingestion endpoint
          # - "fangops-api:3000/api/webhooks/prometheus"
